<!DOCTYPE html>
<html lang="en-GB">

<!---head tag contains metadata about the web page-->
<head> 
    <!---Document name (also = Browser tab text)-->
    <title>GridStream Telemetry Dashboard</title> 
    
    <!--
        The <style> tag tells the browser to interpret text within as visual design layout instructions, changing language to Cascading Style Sheets (CSS)
        The selector is used to target an HTML element and the properties inside {} change that element's appearance
        You can select the following:
            1. A tag name e.g. body and this will impact all <body> blocks
            2. A unique id e.g. #event-display will impact that one exact container id
            3. A Class name to target a reusable group of elements e.g. .substation-card will target any element with the class name "substation-card" assigned to it

        selector {
            property: value;
        }
    -->
    <style>
            /* Target the body to change the overall page theme */
            body {
                font-family: Arial, sans-serif; /* Clean, modern typeface instead of old typewriter font */
                background-color: #f4f6f9;     /* Light grey industrial background tint */
                margin: 30px;                  /* Add breathing space around the edges of the page window */
            }

            /* 
                Target the "substations-grid" <div> container to apply CSS Flexbox layout system
                <div> containers force child elements onto new lines; we use Flexbox to enable cards to sit side-by-side within the container 
            */
            #substations-grid {
                display: flex;       /* Turns this container into a Flexbox row container */
                flex-wrap: wrap;     /* Tells cards: "If you run out of screen width, snap smoothly to a new line below" */
                gap: 20px;           /* Automatically adds a clean 20-pixel padding space between all items horizontally and vertically */
            }

            /* Target any element that has the class name "substation-card" assigned to it */
            .substation-card {
                background-color: #ffffff;      /* Solid white card background */
                padding: 15px;                  /* Internal padding to keep text away from the edges */
                /*margin-bottom: 15px;            /* Vertical spacing outside the card to push cards away from each other. [No longer needed - #substations-grid parent container gap handles this]*/
                border-radius: 4px;             /* Slightly round the corners of the card */
                box-sizing: border-box;         /* Tells the browser to account for the size of the entire card, including padding, so that it shrinks contents to ensure it is no wider than we define below*/
                width: calc(33.333% - 14px);   /* Tells the browser to take up roughly one-third of the screen row per card, subtracting 14px to leave enough room for the 20px gap in #substations-grid*/
            }

            /* 
                Healthy substation state modifier class
                We use dot notation so that we only apply this styling to elements that have both class names (substation-card and nominal-state) attached at the same time 
            */
            .substation-card.nominal-state {
                border-left: 5px solid #28a745; /* Clean Green left accent bar */
            }

            /* Breached voltage or load bounds alert state substation modifier class */
            .substation-card.alert-state {
                border-left: 5px solid #dc3545; /* Critical Alert Red left accent bar */
                background-color: #fff8f8;      /* Soft alert tint covering the card backdrop */
            }
        </style>

</head>

 <!---body tag contains things physically seen on the web page-->
<body>
    <h1>Gridstream Telemetry Dashboard</h1>

    <!-- 
        The <p> tag is a block level container that contains a paragraph of text
        <span> is an inline container (that sits inside a block level container) used for pinpointing and changing a single word or value
        In this case we've applied a bold styling to all text within the <span> tag - "Waiting...", in this case
    -->
    <p>Current Frequency: <span id="freq-display" style="font-weight: bold;">Waiting...</span></p>

    <!--
        Separate paragraph adds a new line
        We'll use the "event_display" span to display an active event
    -->
    <p>Active Event: <span id="event-display" style="font-weight: bold;">Waiting...</span></p>

    <!-- 
        <div> is another block-level container that starts on a newline, similar to <p>
        Unlike <p>, <div> containers can contain other block-level containers, as well as inline containers
        They are non-semantic, meaning they don't tell the browser anything about the content inside (whereas <p> tells the browser it contains text)
        In this case we'll use the <div> container that will allow JavaScript to dynamically inject our list of grid substations without hardcoding
        This allows us to change the number of substations in our grid object and the web page will dynamically update
        We'll use the id to give JS a reference for data injection into our empty <div> container
    -->
    <div id="substations-grid"></div>

    <!-- 
        <pre> is a block level container that stands alone on its own line, similar to <p> (paragraph)
        <pre> preserves formatting, line breaks, and spaces, which preserves our JSON data layout
        We identify and access this container with id "output"
        <pre> is useful when we want to insert formatted text chunks, code, or raw data logs
     -->
    <pre id="output">Waiting for grid telemetry data...</pre> 

    <!--
        <script> tells the browser to stop rendering layouts and swap language to JavaScript, then execute the JS code within the <script> tag
        Inside <script> we gain access to the DOM (document object model) via the global 'document' object, which represents the entire webpage loaded into the browser window
        This allows the websocket to locate our container using its ID ("output") and replace the "Waiting for data ..." text with our JSON formatted grid data string
        We can write JS directly within <script> or fetch JS from external sources and refer to them here using the 'src' attribute. E.g. src="link_goes_here"
        It's good practice to place the <script> at the very bottom of <body> so that all data-binding containers exist on screen before the script tries to interact with them
    -->
    <script> 
    // getElementById method accesses the document object to locate our specific layout container by its ID "output", which we store in outputEL
    const outputEl = document.getElementById("output"); 

    // Establish connection pipeline to local Uvicorn broadcast host
    const socket = new WebSocket('ws://localhost:8000/ws');

    // Unlike Python where we call a function and pass an argument in, here we are using a "Callback Function"
    // You can think of Callback functions like recipes you leave for the browser to execute when a specific trigger occurs
    // In this case, the trigger is a new network message arriving from our websocket
    // The browser automatically creates a pre-packaged JavaScript object containing all the metadata about the network message (including arrival timestamp, network port, and the raw payload .data)
    // We can then reach our grid telemetry data through this JS object by accessing the object .data attribute
    // Note that since we wrote this as an anonymous function (function without a name), it cannot be called or executed elsewhere in the script, making it a tidy single-use callback
    // We don't HAVE to use the parameter name 'event', the browser doesn't care, it just passes in the pre-packaged JavaScript object as the argument 
    // Note that the data arrives to the browser as a string - we'll need to parse the data back into JSON
    socket.onmessage = function (event)  {
        try {
            // Convert the master packet from a string into a JSON object
            const grid_data = JSON.parse(event.data) 

            // Print the data to browser developer console (F12)
            console.log("Parsed Data:", grid_data); 

            // Here we are accessing our <span> inline container, id: "freq-display" and replacing the innerText
            // We use JavaScript dot notation to access the nested elements of our nested JSON object 
            // The "Waiting..." text in our <span> is replaced by our grid live frequency with unit Hz
            document.getElementById("freq-display").innerText = grid_data.grid_global.metrics.live_frequency_hz + " Hz";

            // Create reference to event-display <span> container so we can modify the text dynamically
            // Create reference to the active event name
            const eventEl = document.getElementById("event-display");
            const currentEvent = grid_data.grid_global.system_status.active_event;

            // Dynamically update the "event-display" <span> container
            // Replace container innerText with "NONE - SYSTEM NORMAL" when no event is active, and colour the text green
            // Show "active_event_name" when an event is active, and colour the text red
            if (currentEvent == null) {
                eventEl.innerText = "NONE - SYSTEM NORMAL";
                eventEl.style.color = "#28a745"; // green hex code
            } else {
                eventEl.innerText = currentEvent.toUpperCase();
                eventEl.style.color = "#dc3545"; // red hex code
            }

            // Loop through all substation meters and display data in our <div> container
            
            // Create reference to <div> container
            const substationsContainer = document.getElementById("substations-grid");

            // Loop through list of substation meters using JS built-in forEach method
            // Pass anonymous callback function to forEach that will execute on each item in the list
            // Browser will create a JS object representing each substation meter in the list
            // We pass the JS object as an argument to our callback function for the parameter we've named "meter"
            // Notice that forEach functions similarly to Python's map function, where you can map a function onto each item in an iterable
            grid_data.substations.forEach(function(meter) {
                // Construct a unique ID for this specific substation meter card element
                const cardId = "meter-card-" + meter.meter_id;

                // Search the webpage to see if this card container already exists in memory
                // We need to use let here as const would not allow us to overwrite the cardEl variable
                // If the card is missing, this will return null, and then we can reassign the variable inside the block below
                let cardEl = document.getElementById(cardId);

                // If the card does not exist yet (the very first telemetry frame), build it
                if (cardEl == null) {
                    cardEl = document.createElement("div"); // Create a brand new HTML <div> tag in memory dynamically
                    cardEl.id = cardId;                    // Assign our unique card ID to this <div> container (a.k.a. card)
                    
                    // Attach our visual CSS style class (".substation-card" from above) to this card
                    // This sets the card's div container to e.g. <div id="meter-card-101" class="substation-card"></div>
                    cardEl.className = "substation-card";  

                    substationsContainer.appendChild(cardEl); // Stick the card inside our substations-grid container (parent <div>) as a child container
                }

                // Determine if live voltage and load are out of bounds - and style the cards representing each meter to represent this
                const voltage = meter.readings.voltage_v;
                const load = meter.readings.load_kw;
                const voltageBreached = (voltage < 226.5) || (voltage > 233.5);
                const loadBreached = load > 1080.0;

                if (voltageBreached || loadBreached) {
                    cardEl.className = "substation-card alert-state"; // update cardEl className to include both alert-state and substation-card
                } else {
                    cardEl.className = "substation-card nominal-state";
                }

                // Update phase: Since the card container is safely on screen, inject the live meter values
                // This replaces the internal HTML layout structure with clean data values on every tick
                // innerHTML allows the browser to parse HTML tags; innerText does not
                // <small> drops the font size down 1 size level relative to its parent text container block (h3)
                // <strong> tells the browser and screen-reading accessibility software that the text inside is important and results in a bold style 
                 cardEl.innerHTML = "<h3>" + meter.metadata.location + " <small>(ID: " + meter.meter_id + ")</small></h3>" +
                                    "<p><strong>Active Load:</strong> " + meter.readings.load_kw + " kW</p>" +
                                        "<p><strong>Live Voltage:</strong> " + meter.readings.voltage_v + " V</p>";
            });

            // Access the outputEl (id = "output") and convert the grid_data JSON to a string to print inside the element (null = don't filter data)
            outputEl.innerText = JSON.stringify(grid_data, null, 2); 
        } 
        catch (error) {
            console.error("Received data was not valid JSON:", error);
        }    
        };
    </script>
</body>
</html>
